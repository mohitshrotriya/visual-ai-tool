<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Visual AI Testing Tool</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #eee; min-height: 100vh; }
        header { background: #1a1a2e; padding: 20px; text-align: center; border-bottom: 2px solid #00d4ff; }
        header h1 { color: #00d4ff; font-size: 28px; }
        header p { color: #888; margin-top: 5px; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .card { background: #1a1a1a; border-radius: 12px; padding: 30px; margin-bottom: 30px; border: 1px solid #333; }
        .card h2 { color: #00d4ff; margin-bottom: 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-size: 14px; }
        input[type=text] { width: 100%; padding: 12px; background: #111; border: 1px solid #444; border-radius: 8px; color: #eee; font-size: 14px; }
        input[type=file] { width: 100%; padding: 12px; background: #111; border: 1px solid #444; border-radius: 8px; color: #aaa; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #00d4ff; color: #000; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:hover { background: #00b8d9; }
        button:disabled { background: #333; color: #666; cursor: not-allowed; }
        .result { background: #111; border-radius: 10px; padding: 20px; margin-top: 20px; display: none; }
        .result.show { display: block; }
        .images { display: flex; gap: 15px; margin: 15px 0; flex-wrap: wrap; }
        .img-box { flex: 1; min-width: 200px; text-align: center; }
        .img-box img { width: 100%; border-radius: 8px; border: 1px solid #333; }
        .img-box p { color: #aaa; margin: 8px 0; font-size: 13px; }
        .badge { display: inline-block; padding: 4px 14px; border-radius: 20px; font-weight: bold; font-size: 13px; margin-right: 8px; }
        .badge.bug { background: #ff4444; color: #fff; }
        .badge.ok { background: #00cc44; color: #000; }
        .badge.critical { background: #ff4444; color: #fff; }
        .badge.major { background: #ff8800; color: #000; }
        .badge.minor { background: #ffcc00; color: #000; }
        .badge.none { background: #00cc44; color: #000; }
        .ai-box { background: #0a1628; border-radius: 8px; padding: 15px; margin-top: 15px; border-left: 4px solid #00d4ff; }
        .ai-box h4 { color: #00d4ff; margin-bottom: 10px; }
        .ai-box p { margin: 8px 0; line-height: 1.6; font-size: 14px; }
        .loading { text-align: center; padding: 20px; color: #00d4ff; display: none; }
        .loading.show { display: block; }
        .diff-info { display: flex; gap: 15px; align-items: center; margin: 10px 0; flex-wrap: wrap; }
        .report-link { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #1a1a2e; color: #00d4ff; border-radius: 8px; text-decoration: none; border: 1px solid #00d4ff; }
    </style>
</head>
<body>
    <header>
        <h1>🔍 Visual AI Testing Tool</h1>
        <p>AI powered screenshot comparison for Robot Framework & Playwright</p>
    </header>
    <div class="container">
        <div class="card">
            <h2>📸 Step 1: Baseline Set Karo</h2>
            <div class="form-group">
                <label>Test Name</label>
                <input type="text" id="baseline-name" placeholder="e.g. homepage, login-page" />
            </div>
            <div class="form-group">
                <label>Baseline Image Upload Karo</label>
                <input type="file" id="baseline-file" accept="image/*" />
            </div>
            <button onclick="setBaseline()">✅ Baseline Save Karo</button>
            <div id="baseline-result" class="result"></div>
        </div>
        <div class="card">
            <h2>🔍 Step 2: Compare Karo</h2>
            <div class="form-group">
                <label>Test Name (same as baseline)</label>
                <input type="text" id="compare-name" placeholder="e.g. homepage, login-page" />
            </div>
            <div class="form-group">
                <label>Current Screenshot Upload Karo</label>
                <input type="file" id="compare-file" accept="image/*" />
            </div>
            <button id="compare-btn" onclick="compareImages()">🤖 AI Se Compare Karo</button>
            <div id="compare-loading" class="loading">⏳ AI analysis chal rahi hai... thoda wait karo</div>
            <div id="compare-result" class="result"></div>
        </div>
    </div>
    <script>
        async function setBaseline() {
            const name = document.getElementById('baseline-name').value.trim();
            const file = document.getElementById('baseline-file').files[0];
            if (!name || !file) { alert('Test name aur image dono dalo!'); return; }
            const fd = new FormData();
            fd.append('test_name', name);
            fd.append('image', file);
            const res = await fetch('/set-baseline', { method: 'POST', body: fd });
            const data = await res.json();
            const el = document.getElementById('baseline-result');
            el.innerHTML = data.success
                ? '<p style="color:#00cc44">✅ Baseline saved: <strong>' + name + '</strong></p>'
                : '<p style="color:#ff4444">❌ Error: ' + data.error + '</p>';
            el.classList.add('show');
        }
        async function compareImages() {
            const name = document.getElementById('compare-name').value.trim();
            const file = document.getElementById('compare-file').files[0];
            if (!name || !file) { alert('Test name aur image dono dalo!'); return; }
            document.getElementById('compare-btn').disabled = true;
            document.getElementById('compare-loading').classList.add('show');
            document.getElementById('compare-result').classList.remove('show');
            const fd = new FormData();
            fd.append('test_name', name);
            fd.append('image', file);
            const res = await fetch('/compare', { method: 'POST', body: fd });
            const data = await res.json();
            document.getElementById('compare-loading').classList.remove('show');
            document.getElementById('compare-btn').disabled = false;
            const el = document.getElementById('compare-result');
            if (!data.success) {
                el.innerHTML = '<p style="color:#ff4444">❌ Error: ' + data.error + '</p>';
                el.classList.add('show');
                return;
            }
            const ai = data.ai_analysis || {};
            const isBug = ai.is_bug;
            const severity = (ai.severity || 'NONE').toLowerCase();
            el.innerHTML = '<div class="diff-info">' +
                '<span>📊 Diff: <strong>' + data.diff_percentage + '%</strong></span>' +
                '<span class="badge ' + (isBug ? 'bug' : 'ok') + '">' + (isBug ? '🐛 BUG' : '✅ PASSED') + '</span>' +
                '<span class="badge ' + severity + '">' + (ai.severity || 'NONE') + '</span>' +
                '</div>' +
                '<div class="images">' +
                '<div class="img-box"><p>📸 Baseline</p><img src="' + data.baseline_url + '" /></div>' +
                '<div class="img-box"><p>🔍 Current</p><img src="' + data.current_url + '" /></div>' +
                '<div class="img-box"><p>🔴 Diff</p><img src="' + data.diff_url + '" /></div>' +
                '</div>' +
                (ai.summary ? '<div class="ai-box"><h4>🤖 AI Analysis</h4>' +
                '<p><strong>Summary:</strong> ' + ai.summary + '</p>' +
                '<p><strong>Details:</strong> ' + ai.details + '</p>' +
                '<p><strong>Changed:</strong> ' + (ai.changed_elements || []).join(', ') + '</p>' +
                '<p><strong>Recommendation:</strong> ' + ai.recommendation + '</p></div>' : '') +
                '<a class="report-link" href="' + data.report_url + '" target="_blank">📄 Full HTML Report Dekho</a>';
            el.classList.add('show');
        }
    </script>
</body>
</html>
